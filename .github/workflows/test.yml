name: Test
on:
    pull_request:
        paths:
            - 'go/**/*.go'
defaults:
    run:
        shell: bash
jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                go-version-file: go.mod
            - run: go test go/excellent/*.go